name: CI

# Quality gates for every PR. main is handled by deploy.yml, which re-runs the
# same gates before it builds/ships — so we skip main here to avoid double runs.
on:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: Lint · Types · Build · Test
    runs-on: ubuntu-latest
    # One job per app under apps/. Add an app to the matrix when you scaffold it.
    strategy:
      fail-fast: false
      matrix:
        app: [public, harmony, app, api]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test
