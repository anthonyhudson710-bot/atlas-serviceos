name: Deploy

# On merge to main: re-run gates → build & push image to GHCR → roll the VPS.
on:
  push:
    branches: [main]

# Never run two production deploys at once; let an in-flight one finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  checks:
    name: Lint · Types · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/public/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      # `build` is covered by the Docker image build below (which fails the
      # deploy if `next build` breaks), so we don't double-build here.

  build-push:
    name: Build & push image
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/public
          # `latest` for convenience + the full commit SHA as an immutable,
          # rollback-able tag that matches IMAGE_TAG in the deploy step.
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: apps/public
          file: apps/public/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Roll the production stack over SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          # Write the key stripping any CR (CRLF paste) and forcing a trailing
          # newline — both are common causes of "error in libcrypto".
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # IdentitiesOnly stops ssh from offering the runner's other keys,
          # which otherwise triggers "Too many authentication failures".
          SSH_OPTS="-i $HOME/.ssh/id_ed25519 -o IdentitiesOnly=yes"

          # Ship the infra files (compose, Caddyfile, non-secret .env) to the box.
          ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" "mkdir -p ~/atlas-serviceos"
          scp $SSH_OPTS \
            infra/docker-compose.yml infra/Caddyfile infra/.env \
            "$SSH_USER@$SSH_HOST:~/atlas-serviceos/"

          # Pull the image we just built and roll the stack forward to this SHA.
          ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" \
            "cd ~/atlas-serviceos && export IMAGE_TAG=$IMAGE_TAG && docker compose pull && docker compose up -d --remove-orphans && docker image prune -f"
