name: Deploy

# On merge to main: re-run gates → build & push images to GHCR → roll the VPS.
on:
  push:
    branches: [main]

# Never run two production deploys at once; let an in-flight one finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  checks:
    name: Lint · Types · Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [public, harmony, app, api]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      # `build` is covered by the Docker image build below (which fails the
      # deploy if `next build` breaks), so we don't double-build here.

  build-push:
    name: Build & push image
    needs: checks
    runs-on: ubuntu-latest
    # One image per app → ghcr.io/<repo>/<app>. Both share the IMAGE_TAG = SHA.
    strategy:
      fail-fast: false
      matrix:
        app: [public, harmony, app, api]
    steps:
      # Production must ship readable stack traces. Fail fast (before building or
      # pushing anything) if the Sentry source-map credentials are missing, so a
      # release can never go out silently un-symbolicated. PR CI (ci.yml) does
      # NOT require these — it only compiles, and needs no upload.
      - name: Require Sentry source-map config
        env:
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          : "${SENTRY_ORG:?missing repo variable SENTRY_ORG — set it under Settings → Secrets and variables → Actions → Variables}"
          : "${SENTRY_AUTH_TOKEN:?missing repo secret SENTRY_AUTH_TOKEN — set it under Settings → Secrets and variables → Actions → Secrets}"

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.app }}
          # `latest` for convenience + the full commit SHA as an immutable,
          # rollback-able tag that matches IMAGE_TAG in the deploy step.
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.app }}
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scope the layer cache per app so the two images don't evict each other.
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          # Sentry source-map upload during `next build`. Project is one-per-app
          # (serviceos-<app>); org is a repo variable; the auth token is passed
          # as a BuildKit secret (never baked into a layer). If SENTRY_AUTH_TOKEN
          # is unset the build still succeeds — upload is just skipped.
          build-args: |
            SENTRY_ORG=${{ vars.SENTRY_ORG }}
            SENTRY_PROJECT=serviceos-${{ matrix.app }}
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}

  build-push-caddy:
    name: Build & push Caddy image
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/caddy
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: infra/caddy
          file: infra/caddy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=caddy
          cache-to: type=gha,mode=max,scope=caddy

  deploy:
    name: Deploy to VPS
    needs: [build-push, build-push-caddy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Roll the production stack over SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          IMAGE_TAG: ${{ github.sha }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          # api + postgres + Caddy DNS-01 need these at runtime; fail before
          # touching the server rather than boot a broken stack.
          : "${POSTGRES_PASSWORD:?missing repo secret POSTGRES_PASSWORD}"
          : "${JWT_SECRET:?missing repo secret JWT_SECRET}"
          : "${CLOUDFLARE_API_TOKEN:?missing repo secret CLOUDFLARE_API_TOKEN}"
          mkdir -p ~/.ssh
          # Write the key stripping any CR (CRLF paste) and forcing a trailing
          # newline — both are common causes of "error in libcrypto".
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # IdentitiesOnly stops ssh from offering the runner's other keys,
          # which otherwise triggers "Too many authentication failures".
          SSH_OPTS="-i $HOME/.ssh/id_ed25519 -o IdentitiesOnly=yes"

          # Ship the infra files (compose, Caddyfile, non-secret .env) to the box.
          ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" "mkdir -p ~/atlas-serviceos"
          scp $SSH_OPTS \
            infra/docker-compose.yml infra/Caddyfile infra/.env \
            "$SSH_USER@$SSH_HOST:~/atlas-serviceos/"

          # Write the compose secrets file (api + postgres) via stdin so the
          # values never appear in a process listing on the server.
          printf 'POSTGRES_PASSWORD=%s\nJWT_SECRET=%s\nCLOUDFLARE_API_TOKEN=%s\n' "$POSTGRES_PASSWORD" "$JWT_SECRET" "$CLOUDFLARE_API_TOKEN" \
            | ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" "umask 077 && cat > ~/atlas-serviceos/.env.secrets"

          # Pull the images we just built and roll the stack forward to this SHA.
          ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" \
            "cd ~/atlas-serviceos && export IMAGE_TAG=$IMAGE_TAG && docker compose pull && docker compose up -d --remove-orphans && docker image prune -f"
