name: atlas

# Production stack that runs on the VPS. CI pushes the image to GHCR and then
# runs `docker compose pull && up -d` over SSH from this directory. The server
# only pulls + runs — it never builds. IMAGE_TAG is the deployed commit SHA
# (defaults to `latest` for manual runs); DOMAIN/ACME_EMAIL come from ./.env.
services:
  caddy:
    # Custom build = Caddy + caddy-dns/cloudflare, so TLS certs issue/renew via
    # the DNS-01 challenge (works while domains are proxied). Built in CI.
    image: ghcr.io/anthonyhudson710-bot/atlas-serviceos/caddy:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data # persisted TLS certs — survives deploys, avoids ACME rate limits
      - caddy_config:/config
    # CLOUDFLARE_API_TOKEN for the DNS-01 challenge comes from .env.secrets.
    env_file:
      - .env.secrets
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on:
      - public
      - harmony
      - app
      - api

  public:
    image: ghcr.io/anthonyhudson710-bot/atlas-serviceos/public:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      # Runtime config (read server-side per request — these work without rebuild):
      WAITLIST_STORE_PATH: /data/waitlist.jsonl
      WAITLIST_WEBHOOK_URL: ${WAITLIST_WEBHOOK_URL:-} # optional ESP/CRM/automation forward
      # NOTE: NEXT_PUBLIC_SITE_URL and NEXT_PUBLIC_PLAUSIBLE_DOMAIN are inlined at
      # BUILD time, not here. Site URL defaults to https://www.atlasfsm.com; to
      # enable Plausible, pass NEXT_PUBLIC_PLAUSIBLE_DOMAIN as a build arg in CI.
    volumes:
      - waitlist_data:/data # durable waitlist signups across deploys
    expose:
      - "3000" # internal only; Caddy is the public entrypoint

  # Admin console — the authenticated SaaS workspace at harmony.atlasfsm.com.
  harmony:
    image: ghcr.io/anthonyhudson710-bot/atlas-serviceos/harmony:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      # NOTE: NEXT_PUBLIC_APP_URL is inlined at BUILD time, not here. It defaults
      # to https://harmony.atlasfsm.com; override via a build arg in CI if needed.
    expose:
      - "3000" # internal only; Caddy is the public entrypoint

  # Core product — the authenticated end-user workspace at app.atlasfsm.com.
  app:
    image: ghcr.io/anthonyhudson710-bot/atlas-serviceos/app:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      # NOTE: NEXT_PUBLIC_APP_URL is inlined at BUILD time, not here. It defaults
      # to https://app.atlasfsm.com; override via a build arg in CI if needed.
    expose:
      - "3000" # internal only; Caddy is the public entrypoint

  # Shared backend (apps/api) at api.atlasfsm.com + shared login at
  # iam.atlasfsm.com. Secrets (POSTGRES_PASSWORD, JWT_SECRET) come from
  # ./.env.secrets — see infra/.env.secrets.example. That file is gitignored and
  # must exist next to this compose file (locally and on the server).
  api:
    image: ghcr.io/anthonyhudson710-bot/atlas-serviceos/api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.secrets
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      DB_HOST: postgres
      DB_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-atlas}
      POSTGRES_DB: ${POSTGRES_DB:-atlas}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-.atlasfsm.com}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://app.atlasfsm.com,https://harmony.atlasfsm.com}
      # SENTRY_DSN defaults to the committed serviceos-api DSN in instrument.ts.
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000" # internal only; Caddy is the public entrypoint

  # User store for the API's custom auth. POSTGRES_PASSWORD comes from .env.secrets.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.secrets
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atlas}
      POSTGRES_DB: ${POSTGRES_DB:-atlas}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atlas} -d ${POSTGRES_DB:-atlas}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  caddy_data:
  caddy_config:
  waitlist_data:
  pg_data:
